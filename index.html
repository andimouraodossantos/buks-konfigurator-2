<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUKS Konfigurator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* NUMMER-INPUT: Pfeile ausblenden */
        input[type="text"]::-webkit-inner-spin-button,
        input[type="text"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="text"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* FONTS LADEN */
        @font-face {
            font-family: 'Ginto';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/69473747c264f3658963c657_ABCGintoNord-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Ginto';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/69473763e1d72654dcb3d4ee_ABCGintoNord-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PP Neue Montreal';
            src: url('https://cdn.prod.website-files.com/69472950d86d42b608dff17f/6947378506e75a5f76f39bb5_PPNeueMontreal-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        /* GLOBAL RESETS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Ginto', Georgia, sans-serif;
            background: white;
        }

        /* ANIMATIONS */
        .step-card {
            animation: fadeIn 0.3s;
            border: 1px solid black;
            border-radius: 0 0 5px 5px;
            padding-bottom: 2rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* OPTION CARD WITH IMAGE */
        .option-card {
            border: none;
            border-radius: 0;
            overflow: visible;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .option-card:hover .option-image-container {
            border-color: #ef4444;
        }

        .option-card.active {
            border-color: transparent;
        }

        .option-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 🔥 ANTI-FLICKER: Sanftes Bild-Laden */
        .option-image-container {
            position: relative;
            aspect-ratio: 182/257;
            background: linear-gradient(135deg, #f5f5f5 25%, #e0e0e0 25%, #e0e0e0 50%, #f5f5f5 50%, #f5f5f5 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 40px 40px;
            animation: shimmer 2s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid black;
            border-radius: 5px;
            flex-shrink: 0;
        }

        @keyframes shimmer {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 40px 40px;
            }
        }

        /* Icon während des Ladens */
        .option-image-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            opacity: 0.3;
            z-index: 1;
        }

        /* Icon verschwindet wenn Bild geladen */
        .option-image-container.has-image::before {
            display: none;
        }

        /* 🔥 BILD STYLING */
        .option-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            border-radius: 5px;
        }

        .option-image-container img.loaded {
            opacity: 1;
        }

        .option-checkmark {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: #FF5F37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 2;
        }

        /* ✅ LABEL STYLING - FESTE HÖHE */
        .option-label {
            padding: 1rem 0.5rem;
            margin-top: -0.5rem;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            background: #EBDFC3;
            color: black;
            height: 70px;
            /* ✅ FESTE HÖHE für alle Labels */
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            font-family: 'PP Neue Montreal', 'Ginto', sans-serif;
            border: none;
            border-radius: 0 0 5px 5px;
            overflow: hidden;
        }

        .option-card.active .option-label {
            background: #FF5F37;
            color: white;
        }

        /* GRID FOR CARDS WITH SUB-OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            /* ✅ Kleinere Mindestbreite */
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        /* ✅ NEU: Desktop (>1400px) = 5 Columns */
        @media (min-width: 1400px) {
            .options-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* ✅ NEU: Tablet Landscape (1024px-1399px) = 4 Columns */
        @media (min-width: 1024px) and (max-width: 1399px) {
            .options-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* ✅ NEU: Tablet (768px-1023px) = 3 Columns */
        @media (min-width: 768px) and (max-width: 1023px) {
            .options-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ✅ NEU: Mobile (480px-767px) = 2 Columns */
        @media (min-width: 480px) and (max-width: 767px) {
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Small Mobile (<480px) = 2 Columns */
        @media (max-width: 479px) {
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* SUB-OPTIONS CONTAINER (under card) */
        .sub-options-container {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-radius: 5px;
        }

        /* SUB-OPTIONS ROW BREAK (grid-column: 1/-1, erscheint unter der Reihe der gewählten Karte) */

        /* YES/NO BUTTON STYLE */
        .choice-button {
            padding: 12px 24px;
            min-width: 80px;
            text-align: center;
            border: 1px solid black;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            line-height: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: #F3F3EB;
            color: black;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .choice-button.active {
            background: #FF5F37;
            color: white;
        }

        .choice-button:hover:not(.active) {
            background: #E8E9E0;
        }

        /* INPUT FIELDS */
        .input-field {
            border: 1px solid black;
            border-radius: 5px;
            padding: 12px;
            font-size: 14px;
            color: black;
            line-height: 1;
            width: 100%;
            outline: none;
            font-family: 'PP Neue Montreal', sans-serif;
            background: white;
        }

        .input-field::placeholder {
            color: black;
            opacity: 0.7;
        }

        .input-field:focus,
        .input-field:hover {
            border-color: #ef4444;
            outline: none;
        }

        /* INFO TEXT */
        .info-text {
            font-family: 'PP Neue Montreal', sans-serif;
            font-size: 18px;
            line-height: 22px;
            font-weight: 500;
            color: black;
            margin-top: 34px;
        }
        .info-text:first-child {
            margin-top: 0;
        }

        /* SECTION DIVIDER */
        .section-divider {
            border-bottom: 1px solid #E5E7EB;
            margin: 32px 0;
        }

        /* SIDEBAR */
        .sidebar-item:hover {
            background: #f3f4f6;
            cursor: pointer;
        }

        .sidebar-group {
            border-left: 3px solid #e5e7eb;
            padding: 0 12px;
            margin-bottom: 16px;
        }

        .sidebar-group.active {
            border-left-color: #FF5F37;
        }

        .sidebar-group-header {
            font-weight: 600;
            color: black;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .sidebar-group-header:hover {
            color: #FF5F37;
        }

        /* STICKY BUTTON */
        .sticky-button {
            position: sticky;
            bottom: 20px;
            z-index: 50;
        }

        /* PRIMARY BUTTON */
        .btn-primary {
            display: block;
            /* hinzufügen */
            margin: 0 auto;
            background: #FF5F37;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 97%;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .btn-primary:hover {
            background: #E54F2F;
            box-shadow: 0 4px 12px rgba(255, 95, 55, 0.3);
        }

        /* SECONDARY BUTTON */
        .btn-secondary {
            display: block;
            margin: 0 auto;
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            width: 97%;
            font-family: 'PP Neue Montreal', sans-serif;
            border: 1px solid black;
        }

        .btn-secondary:hover {
            background: #E8E9E0;
        }

        /* SKIP BUTTON */
        .btn-skip {
            display: block;
            margin: 0 auto;
            background: #6d2828;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 97%;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .btn-skip:hover {
            background: #5a2020;
            box-shadow: 0 4px 12px rgba(109, 40, 40, 0.3);
        }

        /* STEP PILLS */
        .step-pill {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'PP Neue Montreal', sans-serif;
            border: 1px solid black;
        }

        .step-pill.active {
            background: #FF5F37;
            color: white;
        }

        .step-pill.completed {
            background: #F3F3EB;
            color: black;
        }

        .step-pill.disabled {
            background: #EBDFC3;
            color: #6b5b3e;
            cursor: not-allowed;
        }

        .step-pill.completed:hover {
            background: #E8E9E0;
        }

        /* FIELD ERROR */
        .field-error {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .required-star {
            display: block;
            color: #222;
            font-size: 0.7rem;
            font-family: 'PP Neue Montreal', sans-serif;
            font-weight: 500;
            letter-spacing: 0.04em;
            margin-top: 2px;
        }

        /* PAGE HINT */
        .page-hint {
            background: white;
            border: 1px solid #e5e7eb;
            border-left: 3px solid #FF5F37;
            border-radius: 0 5px 5px 5px;
            padding: 8px 12px;
            margin-top: 4px;
            font-size: 0.75rem;
            color: black;
            font-family: 'PP Neue Montreal', sans-serif;
        }

        /* INFO BOX (ersetzt alle blauen bg-blue-50 Boxen) */
        .info-box {
            background: white;
            border-left: 3px solid #FF5F37;
            border-radius: 0 5px 5px 0;
            padding: 1rem;
            margin-bottom: 1rem;
            font-family: 'PP Neue Montreal', sans-serif;
            font-size: 0.875rem;
            color: black;
        }

        /* SEITENZAHL-ÜBERSICHT sticky box */
        .seitenzahl-sticky {
            background: #F3F3EB !important;
            box-shadow:
                0 2px 0 0 #FF5F37,
                0 8px 24px -4px rgba(255, 95, 55, 0.14),
                0 20px 40px -8px rgba(0, 0, 0, 0.10);
        }

        /* TWO COLUMN LAYOUT */
        .two-column-field {
            display: grid;
            grid-template-columns: 1fr 4fr;
            /* ✅ MEHR PLATZ: 1:4 statt 2:3 */
            gap: 1.25rem;
            padding: 4.5rem 2.5rem;
            border-bottom: 1px solid black;
        }

        /* ✅ Tablet: 1:3 Verhältnis */
        @media (min-width: 769px) and (max-width: 1200px) {
            .two-column-field {
                grid-template-columns: 1fr 3fr;
                gap: 1.5rem;
            }
        }

        /* ✅ Mobile: Stack vertikal */
        @media (max-width: 768px) {
            .two-column-field {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        /* INDIVIDUELLE ANPASSUNGEN */
        .max-w-7xl {
            max-width: 160rem !important;
        }

        .mb-6 {
            padding: 24px;
        }

        .block.font-medium.mb-2 {
            margin-bottom: 1rem;
        }

        .sidebar-group-header span:first-child {
            color: #000;
            font-size: 14px;
        }

        h3.font-bold.text-lg.mb-4 {
            color: #000;
            font-size: 1.5rem;
        }

        /* SIDEBAR ITEMS: GINTO ORANGE + MONTREAL SCHWARZ */
        .sidebar-item p:first-child {
            font-family: 'Ginto', Georgia, sans-serif;
            color: #FF5F37;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .sidebar-item p:last-child {
            font-family: 'PP Neue Montreal', sans-serif;
            color: #000;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* FLIESSTEXT & HINTS MIT NEUE MONTREAL */
        p,
        .text-sm,
        .text-xs {
            font-family: 'PP Neue Montreal', sans-serif;
        }

        /* GINTO FÜR ÜBERSCHRIFTEN */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Ginto', Georgia, sans-serif;
        }

        /* SPEZIFISCHE HINT-TEXTE */
        .bg-blue-50 p,
        .bg-yellow-50 p,
        .placeholder-warning p {
            font-family: 'PP Neue Montreal', sans-serif;
        }

        .bg-white {
            background-color: #F3F3EB !important;
        }

        /* TWO-COLUMN FIELD LABELS IN MONTREAL MEDIUM */
        .two-column-field h3 {
            font-family: 'PP Neue Montreal', sans-serif !important;
            font-weight: 500 !important;
            line-height: 1.25 !important;
        }

        /* Labels direkt über Inputs: weniger Abstand */
        .two-column-field label {
            margin-bottom: 4px !important;
        }

        .bg-white.rounded-lg.shadow.p-4.mb-6.sticky.top-0.z-40 {
            background-color: white !important;

        }


        .sticky.top-24.max-h-\[calc\(100vh-120px\)\].overflow-y-auto.bg-white {
            background-color: #ffffff !important;
        }

        .bg-white.rounded-lg.shadow.p-6.mb-6 {
            background-color: #ffffff !important;
        }

        .bg-gray-50 {
            background-color: white !important;
        }

        /* ✅ NEU: BINDEART & FORMAT GRID - RESPONSIVE */
        .bindings-grid {
            display: grid;
            gap: 1rem;
            padding: 4.5rem 2rem;
        }

        /* Desktop XL (>1400px) = 5 Columns */
        @media (min-width: 1400px) {
            .bindings-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Desktop (1024px-1399px) = 4 Columns */
        @media (min-width: 1024px) and (max-width: 1399px) {
            .bindings-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Tablet Landscape (768px-1023px) = 3 Columns */
        @media (min-width: 768px) and (max-width: 1023px) {
            .bindings-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Tablet (480px-767px) = 2 Columns */
        @media (min-width: 480px) and (max-width: 767px) {
            .bindings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile (<480px) = 1 Column */
        @media (max-width: 479px) {
            .bindings-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ✅ HAUPTTITEL ORANGE + RECHTS AUSRICHTEN */
        .main-title {
            color: #FF5F37 !important;
            font-family: 'Ginto', Georgia, sans-serif;
        }

        .border-bottom-black {
            border-bottom: 1px solid #000;
        }

        .white-bg-top {
            background-color: white;
        }

        .bindings-grid+.info-text {
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .skip-box {
            margin: 0 2rem;
            position: relative;
            top: 1rem;
        }
    </style>
</head>
<style>
    :root {
        --font-from: 18;
        --font-to: 20;
        --vw-from: calc(1920 / 100);
        --vw-to: calc(2400 / 100);
        --coefficient: calc((var(--font-to) - var(--font-from)) / (var(--vw-to) - var(--vw-from)));
        --base: calc((var(--font-from) - var(--vw-from) * var(--coefficient)) / 16);
    }

    html {
        font-size: calc(var(--base) * 1rem + var(--coefficient) * 1vw);
    }

    @media screen and (max-width: 1920px) {
        :root {
            --font-from: 16;
            --font-to: 18;
            --vw-from: calc(1440 / 100);
            --vw-to: calc(1920 / 100);
        }
    }

    @media screen and (max-width: 1440px) {
        :root {
            --font-from: 12;
            --font-to: 15;
            --vw-from: calc(479 / 100);
            --vw-to: calc(1440 / 100);
        }
    }

    @media screen and (max-width: 479px) {
        :root {
            --font-from: 12;
            --font-to: 16;
            --vw-from: calc(1 / 100);
            --vw-to: calc(479 / 100);
        }
    }

        /* ===================================
           🔥 MOBILE OPTIMIERUNGEN
        =================================== */

        /* Step-Nav: Zurück-Button + Pills-Leiste */
        .step-nav-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Pills-Container: Desktop = wrap, Mobile = horizontal scroll */
        .step-pills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex: 1;
        }

        @media (max-width: 768px) {
            /* Nav stapeln: Zurück oben, Pills darunter */
            .step-nav-container {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            /* Zurück-Button: volle Breite auf Mobile */
            .step-nav-container .btn-secondary {
                width: 100% !important;
            }

            /* Pills: horizontal scrollbar statt wrapping */
            .step-pills-container {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding-bottom: 4px;
            }
            .step-pills-container::-webkit-scrollbar { display: none; }
            .step-pill { flex-shrink: 0; }

            /* TwoColumnField: deutlich weniger padding */
            .two-column-field {
                padding: 1.25rem 1rem;
                gap: 0.75rem;
            }

            /* Bindings/Format-Grid: weniger padding */
            .bindings-grid {
                padding: 1.25rem 1rem;
            }

            /* Header-Padding reduzieren */
            .step-header-label {
                padding: 1rem !important;
            }
            .step-header-content {
                padding: 0 1rem 0.75rem !important;
            }

            /* Titel kleiner */
            .main-title {
                font-size: 1.375rem !important;
            }

            /* Äußerer Wrapper: kein top-padding */
            .min-h-screen.bg-gray-50 {
                padding-top: 0 !important;
            }

            /* Touch-Targets: min. 44px */
            .choice-button {
                min-height: 44px;
            }

            /* Sticky-Button: safe area für iOS */
            .sticky-button {
                bottom: max(12px, env(safe-area-inset-bottom));
            }

            /* Sidebar auf Mobile ausblenden */
            .sidebar-mobile-hide {
                display: none;
            }

            /* Skip-Box: kein horizontales Padding/Margin, volle Breite */
            .skip-box {
                margin: 0 !important;
                top: 0 !important;
                padding-left: 1rem;
                padding-right: 1rem;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }

            /* Bindings-Grid auch auf kleinen Phones 2 Spalten */
            .bindings-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            /* Option-Label etwas kleiner auf kleinen Screens */
            .option-label {
                font-size: 12px;
                height: auto;
                min-height: 50px;
                padding: 1rem 0.5rem 0.5rem;
            }
        }

        /* PRINT SUPPORT */
        .print-only { display: none; }

        @media print {
            .no-print,
            .sidebar-mobile-hide,
            .sticky-button,
            .step-nav-container,
            .white-bg-top,
            .step-header-label,
            .step-header-content,
            .border-bottom-black { display: none !important; }

            body { background: white !important; font-size: 12px; }
            .step-card { border: none !important; padding-bottom: 0 !important; animation: none !important; }
            .print-only { display: block !important; }
            .summary-section { page-break-inside: avoid; }
            .max-w-7xl { max-width: none !important; }
            .min-h-screen { min-height: 0 !important; }
        }

        /* SUMMARY LAYOUT */
        .summary-section {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .summary-section-header {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;

const {

// 🔥 WEB3FORMS — Access Key (web3forms.com)
const WEB3FORMS_ACCESS_KEY = 'e3611c30-fcda-425b-a0ff-1179ee202a2c';

// 🔥 E-MAIL FORMATTER — Baut lesbaren Text für die Team-Mail
const buildEmailMessage = (d) => {
    const val = (label, value) => {
        if (value === '' || value === null || value === undefined || value === false) return '';
        if (value === true) return `${label}: Ja\n`;
        return `${label}: ${value}\n`;
    };
    const sep = (title) => `\n${'─'.repeat(34)}\n ${title}\n${'─'.repeat(34)}\n`;
    const stepLabels = { step2: 'Format', step3: 'Satz & Layout', step4: 'Innenteil', step5: 'Bindung', step6: 'Einband', step7: 'Vorsatz', step8: 'Weiterverarbeitung', step9: 'Schutzumschlag', step10: 'Druckdaten' };

    let msg = '';

    // KONTAKT
    msg += sep('KONTAKT');
    msg += val('Firma', d.firma);
    msg += val('Name', `${d.vorname || ''} ${d.nachname || ''}`.trim());
    msg += val('E-Mail', d.email);
    msg += val('Telefon', d.telefon);
    msg += val('Liefertermin', d.liefertermin);
    msg += val('Lieferadresse', [d.strasse, `${d.plz || ''} ${d.ort || ''}`.trim()].filter(Boolean).join(', '));
    msg += val('Beratung gewünscht', d.beratungGewuenscht);

    // PROJEKT
    msg += sep('PROJEKT');
    msg += val('Bindeart', d.bindeart);
    msg += val('Format', d.format);
    if (d.individuellFormat) msg += val('Ind. Format', `${d.formatBreite} × ${d.formatHoehe} mm (${d.formatOrientierung})`);
    msg += val('Seitenzahl (druckfertig)', d.seitenzahl);

    if (d.scans === 'ja') msg += val('  Anzahl Scans', d.scansInsgesamt);
    msg += val('Layout & Satz', d.layoutUndSatz);
    if (d.layoutUndSatz === 'ja') msg += val('  Manuskriptseiten', d.anzahlManuskriptseiten);
    msg += val('Gesamtseitenzahl Manuskript', d.gesamtseitenzahlManuskript);
    msg += val('Gestaltung Einband', d.gestaltungEinband);
    msg += val('Lektorat', d.lektorat);
    msg += val('Alternative Exemplare', d.alternativeExemplare);
    if (d.alternativeExemplare === 'ja' && Array.isArray(d.alternativeExemplareVarianten)) {
        d.alternativeExemplareVarianten.forEach(v => { if (v.name || v.anzahl) msg += `  - ${v.name}: ${v.anzahl} Stk.\n`; });

    // INNENTEIL
    msg += sep('INNENTEIL');

            const seiten = d.papierSeitenzahlen?.[p];
            const gramm = d.papierGrammatur?.[p];
            msg += `  - ${p}${gramm ? ` ${gramm}g` : ''}${seiten ? `: ${seiten} Seiten` : ''}\n`;

    // EINBAND

    msg += val('Garnfarbe', d.garnfarbe);

        msg += val('Druck', d.druckDeckblatt);
        msg += val('Dispersionslack', d.dispersionslackDeckblatt);
        msg += val('Folienkaschierung', d.folienkaschierungDeckblatt);

        msg += val('Prägung', d.praegungDeckblatt);
        if (d.praegungDeckblatt === 'ja') msg += val('  Typ', d.praegungDeckblattTyp);

        msg += sep('RÜCKBLATT (Wire-O)');

        msg += val('Prägung', d.praegungRueckblatt);

    // VORSATZ

        msg += val('Material', d.schutzumschlagMaterial);

        msg += val('Prägung', d.praegungSchutzumschlag);
        if (d.praegungSchutzumschlag === 'ja') msg += val('  Typ', d.praegungSchutzumschlagTyp);
    }

    // WEITERVERARBEITUNG
    msg += sep('WEITERVERARBEITUNG');
    msg += val('Einschweißen', d.einschweissen);
    msg += val('Banderolieren', d.banderolieren);
    msg += val('Konfektionieren', d.konfektionieren);
    if (d.konfektionieren === 'ja' && d.konfektionierenBeschreibung) msg += val('  Details', d.konfektionierenBeschreibung);

    msg += val('Gummiband', d.gummiband);
    if (d.gummiband === 'ja') { msg += val('  Farbe', d.gummibandFarbe); if (d.gummibandCustom) msg += val('  Wunsch', d.gummibandCustom); }
    msg += val('Registerstanzung', d.registerstanzung);
    if (d.registerstanzung === 'ja') { msg += val('  Typ', d.registerstanzungTyp); if (d.registerstanzungWunsch) msg += val('  Wunsch', d.registerstanzungWunsch); }
    msg += val('Stanzen Pappebuch', d.stanzenPappebuch);

    msg += val('Aufkleber', d.aufkleber);

    // DRUCKDATEN

    msg += val('Druckdatenprüfung', d.druckdatenpruefung);

    // ANMERKUNGEN
    if (d.anmerkungen && typeof d.anmerkungen === 'object') {
        const notes = Object.entries(d.anmerkungen).filter(([, v]) => v && v.trim());
        if (notes.length) {
            msg += sep('ANMERKUNGEN');
            notes.forEach(([k, v]) => { msg += `${stepLabels[k] || k}:\n  ${v}\n`; });
        }
    }

    return msg;
};

// 🔥 DYNAMISCHE SUMMARY-GENERATOR FUNKTION
function generateSummary(formData) {
  const summary = {
    basics: [],
    content: [],
    binding: [],
    cover: [],
    finishing: [],
    final: []
  };

  // 🔥 AUTO: Durch FIELD_CONFIG iterieren
  Object.entries(FIELD_CONFIG).forEach(([field, config]) => {
    const value = config.getValue(formData);
    if (value && value !== '' && value !== null && value !== undefined) {
      summary[config.group].push({
        label: typeof config.label === 'function' ? config.label(formData) : config.label,
        value: value,
        step: config.step
      });
    }
  });

  // 🔥 MANUELL: Komplexe Array-Felder - DRUCK INNENTEIL
  if (formData.druckInnenteil && formData.druckInnenteil.length > 0) {
    const druckNamen = {
      'unbedruckt': 'Unbedruckt',
      '1-1': '1/1 Schwarz',
      '2-2': '2/2 Schwarz + HKS/Pantone',
      '4-4': '4/4 CMYK',
      '5-5': '5/5 CMYK + HKS/Pantone'
    };
    formData.druckInnenteil.forEach(d => {
      const name = druckNamen[d] || d;
      const seiten = formData.druckInnenteilSeitenzahlen[d] ? `${formData.druckInnenteilSeitenzahlen[d]} Seiten` : '';
      summary.content.push({
        label: `Druck Innenteil: ${name}`,
        value: seiten || name,
        step: 4
      });
    });
  }

  // 🔥 MANUELL: Komplexe Array-Felder - PAPIER
  if (formData.papier && formData.papier.length > 0) {
    formData.papier.forEach(p => {
      const gram = formData.papierGrammatur[p] ? `${formData.papierGrammatur[p]}g/m²` : '';
      const eingabe = formData.papierSeitenzahlen[p] || '';
      const typ = formData.papierEingabeTyp[p] || 'seiten';
      const seiten = eingabe ? typ === 'blatt' ? `${eingabe} Blatt (${parseInt(eingabe) * 2} Seiten)` : `${eingabe} Seiten` : '';
      const details = [gram, seiten].filter(Boolean).join(', ');
      summary.content.push({
        label: `Papier: ${p}`,
        value: details || p,
        step: 4
      });
    });
  }

  // 🔥 MANUELL: Alternative Exemplare (komplexe Varianten)
  if (formData.alternativeExemplare === 'ja' && formData.alternativeExemplareVarianten.length > 0) {
    formData.alternativeExemplareVarianten.forEach((variant, index) => {
      if (variant.name || variant.anzahl) {
        const details = [variant.name, variant.anzahl ? `${variant.anzahl} Stück` : ''].filter(Boolean).join(': ');
        summary.binding.push({
          label: `Alternative Exemplare ${index + 1}`,
          value: details || `Variante ${index + 1}`,
          step: 5
        });
      }
    });
  }

  // 🔥 MANUELL: Aufkleber (viele Unterfelder)
  if (formData.aufkleber === 'ja') {
    if (formData.aufkleberGroesse) {
      summary.finishing.push({
        label: 'Aufkleber Größe',
        value: formData.aufkleberGroesse,
        step: 8
      });
    }
    if (formData.aufkleberAnbringen) {
      summary.finishing.push({
        label: 'Aufkleber Anbringen',
        value: formData.aufkleberAnbringen,
        step: 8
      });
    }
    if (formData.aufkleberForm) {
      summary.finishing.push({
        label: 'Aufkleber Form',
        value: formData.aufkleberForm,
        step: 8
      });
    }
    if (formData.aufkleberMaterial) {
      summary.finishing.push({
        label: 'Aufkleber Material',
        value: formData.aufkleberMaterial,
        step: 8
      });
    }
    if (formData.aufkleberFarbigkeit) {
      summary.finishing.push({
        label: 'Aufkleber Farbigkeit',
        value: formData.aufkleberFarbigkeit,
        step: 8
      });
    }
  }
  return summary;
}
